<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI MASTER BOT v11.0 - PRO MULTI-THREADER</title>
    <style>
        :root { --neon: #00ff9f; --bg: #050505; --card: #111; }
        body { background: var(--bg); color: var(--neon); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 15px; overflow-x: hidden; }
        
        .master-panel { 
            background: var(--card); padding: 25px; border: 2px solid var(--neon); 
            border-radius: 15px; position: sticky; top: 0; z-index: 1000; 
            box-shadow: 0 0 25px rgba(0,255,159,0.2); margin-bottom: 20px;
        }

        /* PC-তে ১০০০ ডিসপ্লে সাপোর্ট করার জন্য অপ্টিমাইজড গ্রিড */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
            gap: 15px; 
        }

        .clone-box { 
            background: #1a1a1a; border: 1px solid #333; height: 350px; 
            border-radius: 12px; overflow: hidden; position: relative; 
            border-bottom: 4px solid var(--neon); 
        }
        
        iframe { width: 100%; height: 100%; border: none; background: #000; }
        
        input, select { 
            width: 100%; padding: 12px; background: #000; color: #fff; 
            border: 1px solid #444; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; 
        }

        button { 
            background: var(--neon); color: #000; border: none; padding: 15px; 
            border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; 
            font-size: 16px; text-transform: uppercase; transition: 0.3s;
        }
        button:hover { background: #fff; transform: scale(1.01); }

        .status-bar { 
            display: flex; justify-content: space-between; margin-top: 15px; 
            padding: 15px; background: #1a1a1a; border-radius: 10px; font-weight: bold;
        }

        .bot-log { 
            color: #ffd700; font-size: 11px; padding: 8px; text-align: center; 
            background: rgba(0,0,0,0.8); position: absolute; bottom: 0; width: 100%; 
        }

        #counter { color: cyan; font-size: 1.2em; }
    </style>
</head>
<body>

<div class="master-panel">
    <h2 style="text-align:center; margin:0 0 15px 0; letter-spacing: 2px;">🤖 AI MULTI-TASK MASTER v11.0</h2>
    
    <div style="display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 10px;">
        <input type="text" id="targetUrl" placeholder="Link (Adsterra, YouTube, FB, or TikTok)">
        <input type="number" id="displayNum" value="10" placeholder="Threads (Max 1000)">
        <input type="number" id="taskTime" value="45" placeholder="Time (Sec)">
    </div>

    <div style="display: flex; gap: 10px; margin-top: 5px;">
        <select id="platformType">
            <option value="adsterra">Platform: Adsterra/Earning Site</option>
            <option value="youtube">Platform: YouTube (Watch Time)</option>
            <option value="facebook">Platform: Facebook Video</option>
            <option value="tiktok">Platform: TikTok Video</option>
        </select>
        <button onclick="startMission()" id="mainBtn">🚀 START MISSION</button>
    </div>

    <div class="status-bar">
        <span>SYSTEM: <span id="systemStatus" style="color:#fff;">READY</span></span>
        <span>TASKS COMPLETED: <span id="counter">0</span> / 1000</span>
    </div>
</div>

<div class="grid" id="container"></div>

<script>
    let completedTasks = 0;
    let isRunning = false;

    async function startMission() {
        if(isRunning) { location.reload(); return; }

        const url = document.getElementById('targetUrl').value;
        const displayCount = parseInt(document.getElementById('displayNum').value);
        const cycleTime = parseInt(document.getElementById('taskTime').value) * 1000;
        const platform = document.getElementById('platformType').value;

        if(!url) return alert("অনুগ্রহ করে লিঙ্কটি দিন!");

        isRunning = true;
        document.getElementById('mainBtn').innerText = "⏹ STOP BOT";
        document.getElementById('mainBtn').style.background = "#ff3f34";
        document.getElementById('systemStatus').innerText = "EXECUTING THREADS...";

        while (completedTasks < 1000 && isRunning) {
            const container = document.getElementById('container');
            container.innerHTML = ''; // Memory Management: Clear previous batch

            let batchPromises = [];
            for (let i = 0; i < displayCount && completedTasks < 1000; i++) {
                batchPromises.push(createTaskNode(url, cycleTime, platform));
            }
            
            await Promise.all(batchPromises);
            await new Promise(r => setTimeout(r, 2000)); // Cool down
        }
    }

    function createTaskNode(baseUrl, duration, platform) {
        return new Promise(resolve => {
            const container = document.getElementById('container');
            const uName = "Bot_" + Math.random().toString(36).substring(7);
            const uIP = `${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}`;
            
            let finalUrl = baseUrl;

            // প্লাটফর্ম অনুযায়ী ইউআরএল কনভার্ট
            if(platform === 'youtube') {
                let vidId = baseUrl.split('v=')[1]?.split('&')[0] || baseUrl.split('/').pop();
                finalUrl = `https://www.youtube.com/embed/${vidId}?autoplay=1&mute=1&playlist=${vidId}&loop=1`;
            } else if(platform === 'facebook') {
                finalUrl = `https://www.facebook.com/plugins/video.php?href=${encodeURIComponent(baseUrl)}&show_text=0&autoplay=1`;
            } else if(platform === 'adsterra') {
                finalUrl = baseUrl.includes('?') ? `${baseUrl}&user=${uName}&bot=true` : `${baseUrl}?user=${uName}&bot=true`;
            }

            const div = document.createElement('div');
            div.className = 'clone-box';
            const taskId = Math.random().toString(36).substring(5);
            
            div.innerHTML = `
                <div class="clone-info">
                    <span>👤 ${uName}</span>
                    <span style="color:cyan;">🌐 IP: ${uIP}</span>
                </div>
                <iframe src="${finalUrl}" id="frame-${taskId}" allow="autoplay; encrypted-media" sandbox="allow-scripts allow-forms allow-same-origin allow-popups"></iframe>
                <div class="bot-log" id="log-${taskId}">🚀 Initializing...</div>
            `;
            container.appendChild(div);

            const frame = document.getElementById(`frame-${taskId}`);
            const log = document.getElementById(`log-${taskId}`);

            // টাস্ক প্রসেসিং
            setTimeout(() => {
                log.innerText = "⚡ Working on Task...";
                
                // আর্নিং সাইট হলে ক্লিক সিগন্যাল পাঠানো
                if(platform === 'adsterra' && frame.contentWindow) {
                    frame.contentWindow.postMessage('click_task', '*');
                }

                setTimeout(() => {
                    completedTasks++;
                    document.getElementById('counter').innerText = completedTasks;
                    log.innerText = "✅ Done!";
                    resolve();
                }, duration - 5000);

            }, 5000); 
        });
    }
</script>

</body>
</html>
